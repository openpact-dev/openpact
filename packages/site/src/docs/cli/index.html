<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f3eee2" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0e0a09" media="(prefers-color-scheme: dark)" />
    <!-- Apply persisted theme synchronously, before paint, to avoid FOUC. -->
    <script>
      ;(function () {
        try {
          var p = localStorage.getItem('openpact:theme')
          var r =
            p === 'dark' || p === 'light'
              ? p
              : matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
          document.documentElement.classList.add(r)
          document.documentElement.style.colorScheme = r
        } catch (e) {}
      })()
    </script>

    <title>CLI reference — OpenPact</title>
    <meta name="description" content="Every openpact verb and its flags." />
    <link rel="canonical" href="https://openpact.dev/docs/cli/" />

    <meta property="og:type" content="article" />
    <meta property="og:title" content="CLI reference — OpenPact" />
    <meta property="og:description" content="Every openpact verb and its flags." />
    <meta property="og:image" content="https://openpact.dev/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="../../entries/docs-cli.tsx"></script>
  </body>
</html>
