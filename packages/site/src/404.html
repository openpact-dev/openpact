<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f3eee2" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0e0a09" media="(prefers-color-scheme: dark)" />
    <!-- Apply persisted theme synchronously, before paint, to avoid FOUC. -->
    <script>(function(){try{var p=localStorage.getItem("openpact:theme");var r=p==="dark"||p==="light"?p:(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.classList.add(r);document.documentElement.style.colorScheme=r;}catch(e){}})();</script>

    <title>Not found — OpenPact</title>
    <meta name="robots" content="noindex" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./entries/not-found.tsx"></script>
  </body>
</html>
