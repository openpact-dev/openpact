<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    OpenPact mark — the watching daemon.

    Composition (from dashboard's Ornament.tsx WatchingEye):
      - two horns curving up and outward from the eye
      - a wide almond eye with a glowing iris ring and slit pupil
      - three agent nodes below, connected in a triangle
  -->
  <defs>
    <radialGradient id="ambient" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.32"/>
      <stop offset="55%" stop-color="#EF4444" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="iris" cx="0.5" cy="0.5" r="0.58">
      <stop offset="0%" stop-color="#FECACA"/>
      <stop offset="45%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#991B1B"/>
    </radialGradient>
  </defs>

  <!-- Abyss background -->
  <rect width="512" height="512" rx="96" fill="#0F0A0A"/>

  <!-- Ambient ember glow -->
  <circle cx="256" cy="256" r="230" fill="url(#ambient)"/>

  <g fill="none" stroke="#EF4444" stroke-linecap="round" stroke-linejoin="round">

    <!-- Left horn: sweeps up-and-leftward from the eye-brow to a point.
         Single open curve; no loop. -->
    <path d="M 160 180 C 126 128, 108 76, 96 36" stroke-width="16"/>
    <!-- Right horn: mirror -->
    <path d="M 352 180 C 386 128, 404 76, 416 36" stroke-width="16"/>

    <!-- Eye almond (vesica) -->
    <path d="M 48 260 C 112 180, 176 148, 256 148 C 336 148, 400 180, 464 260
             C 400 340, 336 372, 256 372 C 176 372, 112 340, 48 260 Z"
          stroke-width="16"/>

    <!-- Iris ring with warm glowing fill -->
    <circle cx="256" cy="260" r="72" stroke-width="14" fill="url(#iris)" fill-opacity="0.45"/>

    <!-- Three agent nodes below -->
    <circle cx="176" cy="432" r="20" fill="#EF4444" stroke="none"/>
    <circle cx="256" cy="460" r="20" fill="#EF4444" stroke="none"/>
    <circle cx="336" cy="432" r="20" fill="#EF4444" stroke="none"/>

    <!-- Triangle connecting the nodes -->
    <path d="M 176 432 L 256 460 L 336 432 Z" stroke-width="6" stroke-opacity="0.45"/>
  </g>

  <!-- Slit pupil -->
  <ellipse cx="256" cy="260" rx="12" ry="56" fill="#0F0A0A"/>
  <!-- Ember highlight in the pupil -->
  <circle cx="252" cy="224" r="4" fill="#FECACA" fill-opacity="0.75"/>
</svg>
