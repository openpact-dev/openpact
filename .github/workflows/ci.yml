name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }}, node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [blacksmith-4vcpu-ubuntu-2404, macos-latest]
        node: ['20.x', '22.x']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.node == '22.x'
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
        continue-on-error: true

  e2e:
    name: e2e (ubuntu, node 22)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python deps for the langchain example smoke test
        run: pip install -r examples/langchain/requirements.txt
      - run: npm ci
      - name: Run e2e tests
        run: npm run test:e2e
      - name: Run example smoke tests
        run: npm run test:examples

  dashboard:
    name: dashboard (ubuntu, node 22)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm
      - run: npm ci
      - name: Build SDK (dashboard depends on it)
        run: npm run -w @openpact/sdk build
      - name: Build dashboard
        run: npm run -w @openpact/dashboard build
      - name: Server tests
        run: npm run -w @openpact/dashboard test
      - name: Hook tests (vitest + jsdom)
        run: npm run -w @openpact/dashboard test:hooks
      - name: Bundle budget
        run: npm run -w @openpact/dashboard size
