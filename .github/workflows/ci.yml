name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (ubuntu, node 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage:ci
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
        continue-on-error: true

  e2e:
    name: e2e (ubuntu, node 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python deps for the langchain example smoke test
        run: pip install -r examples/langchain/requirements.txt
      - run: npm ci
      - name: Run e2e tests
        run: npm run test:e2e
      - name: Run example smoke tests
        run: npm run test:examples

  dashboard:
    name: dashboard (ubuntu, node 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm
      - run: npm ci
      - name: Build SDK (dashboard depends on it)
        run: npm run -w @openpact/sdk build
      - name: Build dashboard
        run: npm run -w @openpact/dashboard build
      - name: Hook tests (vitest + jsdom)
        run: npm run -w @openpact/dashboard test:hooks
      - name: Bundle budget
        run: npm run -w @openpact/dashboard size

  site:
    name: site (ubuntu, node 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm
      - run: npm ci
      - name: Build site
        run: npm run -w @openpact/site build
      - name: Verify public assets made it into dist
        run: test -f packages/site/dist/robots.txt && test -f packages/site/dist/sitemap.xml && test -f packages/site/dist/llms.txt && test -f packages/site/dist/favicon.svg
